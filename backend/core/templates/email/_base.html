<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bill n' Chill{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background:#f4f4f5; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing:antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#f4f4f5; padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="background:#ffffff; border-radius:8px; max-width:600px; width:100%; border:1px solid #e4e4e7;">
          <!-- Header -->
          <tr>
            <td style="padding:24px 32px 16px; border-bottom:1px solid #e4e4e7;">
              <strong style="font-size:18px; color:#18181b; letter-spacing:-0.01em;">Bill n' Chill</strong>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:28px 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px 24px; border-top:1px solid #e4e4e7;">
              <p style="margin:0; color:#a1a1aa; font-size:13px; line-height:1.5;">{% block footer %}If you have questions, visit <a href="{{ frontend_url }}" style="color:#a1a1aa;">bill-n-chill.com</a>.{% endblock %}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
