services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bill_n_chill}
      MYSQL_USER: ${MYSQL_USER:-bnc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bnc_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-bnc}:${MYSQL_PASSWORD:-bnc_password}@db:3306/${MYSQL_DATABASE:-bill_n_chill}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-mailto:support@bill-n-chill.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      SERVER_API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    command: >-
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

volumes:
  mysql_data:
  media_data:
