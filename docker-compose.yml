services:
  db:
    image: mysql:8.4
    container_name: bnc-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bill_n_chill}
      MYSQL_USER: ${MYSQL_USER:-bnc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bnc_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    container_name: bnc-backend
    working_dir: /app/backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-bnc}:${MYSQL_PASSWORD:-bnc_password}@db:3306/${MYSQL_DATABASE:-bill_n_chill}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20-alpine
    container_name: bnc-frontend
    working_dir: /app/frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    command: >-
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  mysql_data:
