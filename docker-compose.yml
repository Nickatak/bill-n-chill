services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bill_n_chill}
      POSTGRES_USER: ${POSTGRES_USER:-bnc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bnc_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bnc} -d ${POSTGRES_DB:-bill_n_chill}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bnc}:${POSTGRES_PASSWORD:-bnc_password}@db:5432/${POSTGRES_DB:-bill_n_chill}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@bill-n-chill.com}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-mailto:support@bill-n-chill.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
      - ./logs:/var/log/bnc
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  worker:
    image: python:3.12-slim
    working_dir: /app/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bnc}:${POSTGRES_PASSWORD:-bnc_password}@db:5432/${POSTGRES_DB:-bill_n_chill}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@bill-n-chill.com}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-mailto:support@bill-n-chill.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
      - ./logs:/var/log/bnc
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py qcluster"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      SERVER_API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    command: >-
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

volumes:
  pg_data:
  media_data:
