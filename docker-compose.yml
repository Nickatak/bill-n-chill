services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bill_n_chill}
      MYSQL_USER: ${MYSQL_USER:-bnc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bnc_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://${MYSQL_USER:-bnc}:${MYSQL_PASSWORD:-bnc_password}@db:3306/${MYSQL_DATABASE:-bill_n_chill}}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: >-
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    command: >-
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  mysql_data:
