name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_bill_n_chill
          POSTGRES_USER: bnc
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bnc -d test_bill_n_chill"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Grant test DB permissions
        env:
          PGPASSWORD: ci_password
        run: psql -h 127.0.0.1 -U bnc -d test_bill_n_chill -c "ALTER USER bnc CREATEDB;"

      - name: Lint Python
        run: pip install ruff && ruff check backend/

      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://bnc:ci_password@127.0.0.1:5432/test_bill_n_chill
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: python manage.py test core.tests --noinput

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build
