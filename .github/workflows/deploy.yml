name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status --jq '.state')
          if [ "$STATUS" != "success" ]; then
            echo "CI has not passed on this commit (status: $STATUS). Aborting deploy."
            exit 1
          fi

      - name: Deploy to VPS
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@"$DEPLOY_HOST" '
            cd ~/bill-n-chill &&
            git pull &&
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
          '
